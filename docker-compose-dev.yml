services:
  auth-service:
    build:
      context: auth-service
      dockerfile: Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./auth-service/src:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    depends_on:
      - broker

  user-service:
    build:
      context: user-service
      dockerfile: Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./user-service/src:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    depends_on:
      - broker