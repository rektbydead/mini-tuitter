services:
  nginx:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - user-service
      - auth-service

  auth-service:
    build:
      context: auth-service
      dockerfile: Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  user-service:
    build:
      context: user-service
      dockerfile: Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  user-service-consumer:
    build:
      context: user-service
    command: python -m kafka.account_event_consumer
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  kafka-init:
    image: apache/kafka:latest
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    volumes:
      - ./scripts/create-topics.sh:/create-topics.sh
    depends_on:
      broker:
        condition: service_healthy

  broker:
    image: apache/kafka:latest
    hostname: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server broker:29092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    ports:
      - "8081:8081"
    depends_on:
      broker:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:29092

volumes:
  sqlite_data: