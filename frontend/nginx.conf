server {
    listen 80;

    resolver 127.0.0.11 valid=10s;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/auth/ {
        proxy_pass http://auth-service:8000/;
    }

    location /api/user/ {
        proxy_pass http://user-service:8000/;
    }
}